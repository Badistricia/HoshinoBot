<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
    <style>
        /* 引入中文字体 */
        @font-face {
            font-family: 'MiSans';
            src: local('Microsoft YaHei'), local('PingFang SC'), local('Noto Sans SC'), sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: transparent; /* 背景透明，由截图工具决定 */
            font-family: 'MiSans', 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* 便利贴容器 */
        .sticky-note {
            background: linear-gradient(135deg, #fef3bd 0%, #f9ea8f 100%); /* 渐变黄 */
            width: 380px;
            min-height: 450px;
            padding: 25px 30px 40px;
            box-shadow: 
                5px 5px 15px rgba(0,0,0,0.15),
                0 0 1px rgba(0,0,0,0.1);
            position: relative;
            transform: rotate(-1deg); /* 微微倾斜 */
            border-radius: 2px;
        }

        /* 顶部胶带效果 */
        .tape {
            background-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            width: 130px;
            height: 38px;
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%) rotate(-1.5deg);
            z-index: 10;
            backdrop-filter: blur(1px);
            border-left: 1px solid rgba(255,255,255,0.4);
            border-right: 1px solid rgba(255,255,255,0.4);
        }

        /* 标题 */
        h1 {
            text-align: center;
            color: #5d5d5d;
            font-size: 28px;
            margin: 15px 0 20px;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive; /* 手写感标题 */
        }

        /* 分割线 */
        .divider {
            border-bottom: 2px dashed #d6cf9c;
            margin-bottom: 25px;
            width: 100%;
        }

        /* 列表 */
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            display: flex;
            align-items: flex-start;
            padding: 12px 5px;
            border-bottom: 1px solid rgba(160, 150, 100, 0.2);
            position: relative;
            transition: all 0.2s;
        }

        li:last-child {
            border-bottom: none;
        }

        /* ID 徽章 */
        .id-badge {
            flex-shrink: 0;
            background-color: #ff8c42;
            color: white;
            font-weight: bold;
            font-size: 14px;
            padding: 2px 6px;
            border-radius: 6px;
            margin-right: 12px;
            margin-top: 3px;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.2);
            min-width: 18px;
            text-align: center;
        }

        /* 内容区域 */
        .content-box {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .text {
            color: #444;
            font-size: 18px;
            line-height: 1.5;
            word-break: break-all;
        }

        /* 时间显示 */
        .time {
            font-size: 13px;
            color: #d35400;
            margin-top: 4px;
            display: flex;
            align-items: center;
            font-weight: 500;
        }
        
        .time::before {
            content: "⏰";
            margin-right: 4px;
            font-size: 12px;
        }

        /* 已完成样式 */
        li.done .text {
            text-decoration: line-through;
            color: #aaa;
        }
        
        li.done .id-badge {
            background-color: #ccc;
            box-shadow: none;
        }

        li.done .time {
            display: none;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            color: #888;
            margin-top: 60px;
            font-size: 16px;
            line-height: 1.8;
        }
        
        .empty-icon {
            font-size: 40px;
            margin-bottom: 10px;
            opacity: 0.5;
            display: block;
        }

        /* 底部装饰 */
        .footer-deco {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 12px;
            color: rgba(0,0,0,0.3);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="sticky-note">
        <div class="tape"></div>
        <h1>Todo List</h1>
        <div class="divider"></div>
        
        <ul>
            {% for item in todos %}
            <li class="{% if item.is_done %}done{% endif %}">
                <span class="id-badge">{{ item.id }}</span>
                <div class="content-box">
                    <span class="text">{{ item.content }}</span>
                    {% if item.due_date and not item.is_done %}
                    <span class="time">{{ item.due_date }}</span>
                    {% endif %}
                </div>
            </li>
            {% endfor %}
        </ul>

        {% if not todos %}
        <div class="empty-state">
            <span class="empty-icon">📝</span>
            喵~ 暂时没有待办事项哦！<br>
            试试输入 "记 [事情]" 吧~
        </div>
        {% endif %}

        <div class="footer-deco">Powered by HoshinoBot</div>
    </div>
</body>
</html>
